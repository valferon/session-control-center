<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../tokens.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-canvas); color: var(--fg-primary); font-family: var(--font-sans); }
  h3 { font-size: var(--fs-label); font-weight: var(--fw-label); letter-spacing: var(--tr-label); text-transform: uppercase; color: var(--fg-tertiary); margin: 28px 0 12px; }
  h3:first-child { margin-top: 0; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* buttons */
  .btn { font-family: inherit; font-size: 12px; border-radius: var(--radius-sm); padding: 7px 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); color: var(--fg-primary); transition: background var(--dur-fast) var(--ease-out); }
  .btn:hover { background: var(--bg-surface-2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--fg-on-accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.ghost { background: transparent; }

  /* pills */
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 550; padding: 3px 9px 3px 7px; border-radius: 999px; text-transform: capitalize; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill.active { color: var(--success); background: var(--success-soft); } .pill.active .dot { background: var(--success); }
  .pill.idle { color: var(--warning); background: var(--warning-soft); } .pill.idle .dot { background: var(--warning); }
  .pill.closed { color: var(--fg-secondary); background: var(--bg-surface-2); } .pill.closed .dot { background: var(--fg-tertiary); }

  /* tiles */
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { position: relative; background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 13px 15px; overflow: hidden; }
  .tile::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent-col, var(--accent)); }
  .tile .v { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .tile .l { font-size: var(--fs-label); text-transform: uppercase; letter-spacing: var(--tr-label); color: var(--fg-tertiary); margin-top: 3px; }
  .tile.green { --accent-col: var(--success); } .tile.green .v { color: var(--success); }
  .tile.blue { --accent-col: var(--info); }
  .tile.purple { --accent-col: var(--purple); }
  .tile.yellow { --accent-col: var(--warning); }

  /* input */
  .input { width: 280px; padding: 8px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-sunken); color: var(--fg-primary); font-size: 12px; }
  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .model-tag { font-size: 10px; padding: 2px 8px; border-radius: var(--radius-xs); background: var(--bg-surface-2); color: var(--fg-secondary); font-family: var(--font-mono); }

  /* chart */
  .chart { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 14px; width: 360px; }
  .bars { display: flex; align-items: flex-end; gap: 4px; height: 64px; }
  .bar-col { flex: 1; display: flex; align-items: flex-end; height: 100%; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; background: linear-gradient(180deg, var(--info), rgba(68,147,248,0.25)); }
</style>
</head>
<body>
  <h3>Buttons</h3>
  <div class="row">
    <button class="btn primary">New session</button>
    <button class="btn">Open repo</button>
    <button class="btn ghost">⟳ Refresh</button>
  </div>

  <h3>Status pills</h3>
  <div class="row">
    <span class="pill active"><span class="dot"></span>active</span>
    <span class="pill idle"><span class="dot"></span>idle</span>
    <span class="pill closed"><span class="dot"></span>closed</span>
  </div>

  <h3>Metric tiles</h3>
  <div class="tiles">
    <div class="tile green"><div class="v">3</div><div class="l">Active now</div></div>
    <div class="tile blue"><div class="v">318</div><div class="l">Sessions</div></div>
    <div class="tile purple"><div class="v">50</div><div class="l">Projects</div></div>
    <div class="tile yellow"><div class="v">$885</div><div class="l">Est. cost</div></div>
  </div>

  <h3>Input + tags</h3>
  <div class="row">
    <input class="input" placeholder="Search title, branch, repo, model…" />
    <span class="model-tag">opus</span>
    <span class="model-tag">sonnet</span>
    <span class="model-tag">haiku</span>
  </div>

  <h3>Activity chart</h3>
  <div class="chart">
    <div class="bars">
      <div class="bar-col"><div class="bar" style="height:30%"></div></div>
      <div class="bar-col"><div class="bar" style="height:55%"></div></div>
      <div class="bar-col"><div class="bar" style="height:80%"></div></div>
      <div class="bar-col"><div class="bar" style="height:45%"></div></div>
      <div class="bar-col"><div class="bar" style="height:95%"></div></div>
      <div class="bar-col"><div class="bar" style="height:60%"></div></div>
      <div class="bar-col"><div class="bar" style="height:35%"></div></div>
      <div class="bar-col"><div class="bar" style="height:70%"></div></div>
    </div>
  </div>
</body>
</html>
