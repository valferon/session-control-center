name: release

# Trigger on version tags, e.g. `git tag v0.1.0 && git push --tags`
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      # pnpm 11 treats un-approved dependency build scripts as a fatal error.
      # esbuild bundles fine without them, so downgrade to a warning.
      PNPM_CONFIG_STRICT_DEP_BUILDS: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build + package .vsix
        run: pnpm package

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          # namespace must match the "publisher" in package.json; ignore "already exists"
          npx ovsx create-namespace valferon -p "$OVSX_PAT" || true
          npx ovsx publish *.vsix -p "$OVSX_PAT"

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath *.vsix -p "$VSCE_PAT"
